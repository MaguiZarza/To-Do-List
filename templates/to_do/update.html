<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actualizar tarea</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #f4e6d7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      width: 100%;
      background: #fff8f0;
      padding: 40px 35px;
      border-radius: 30px;
      box-shadow: 0 20px 35px rgba(110, 70, 40, 0.15);
      border: 1px solid #e2d3c1;
    }

    h3 {
      color: #6b4f3c;
      font-size: 32px;
      font-weight: 500;
      text-align: center;
      margin-bottom: 30px;
      letter-spacing: 1px;
      border-bottom: 2px dashed #dbb88c;
      padding-bottom: 15px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 25px;
    }

    label {
      color: #6b4f3c;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 5px;
      display: block;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid #e0cfbc;
      border-radius: 40px;
      font-size: 16px;
      background: #fefaf5;
      transition: all 0.3s;
      color: #4a3729;
    }

    input[type="text"]:focus {
      border-color: #b48c63;
      outline: none;
      box-shadow: 0 0 0 4px rgba(180, 140, 99, 0.2);
      background: #fff;
    }

    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f3e9de;
      padding: 15px 20px;
      border-radius: 60px;
      margin: 5px 0;
    }

    .checkbox-field label {
      margin: 0;
      cursor: pointer;
      color: #4a3729;
      font-weight: 500;
    }

    input[type="checkbox"] {
      width: 22px;
      height: 22px;
      accent-color: #8b6f50;
      cursor: pointer;
    }

    button {
      background: #8b6f50;
      color: white;
      border: none;
      padding: 18px 30px;
      border-radius: 60px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 8px 15px rgba(110, 70, 40, 0.25);
      letter-spacing: 0.5px;
      margin-top: 10px;
    }

    button:hover {
      background: #6b4f3c;
      transform: translateY(-3px);
      box-shadow: 0 12px 20px rgba(90, 55, 30, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    a {
      color: #8b6f50;
      text-decoration: none;
      font-size: 18px;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 40px;
      background: #ede3d7;
      transition: all 0.3s;
      width: fit-content;
    }

    a:hover {
      background: #dccbbb;
      color: #4a3729;
      transform: translateX(-5px);
    }

    .container::before {
      content: "✏️";
      font-size: 40px;
      display: block;
      text-align: center;
      margin-bottom: 5px;
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <h3>Actualizar tarea</h3>
    
    <form method="POST">
      {% csrf_token %}
      
      <div>
        <label for="id_title">Título de la tarea</label>
        {{ form.title }}
      </div>

      <div class="checkbox-field">
        {{ form.completed }}
        <label for="id_completed">Marcar como completada</label>
      </div>

      <button type="submit">Guardar cambios</button>
    </form>
    
    <a href="/">← Volver a la lista</a>
  </div>
</body>
</html>
